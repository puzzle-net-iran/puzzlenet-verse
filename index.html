<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>پازل‌نت ورس — PuzzleNet Verse</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="boot">
  <div class="boot-logo">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <path d="M20 8h10a4 4 0 0 1 0 8 4 4 0 0 0 0 8h10v10H30a4 4 0 0 0 0 8 4 4 0 0 1 0 8H20V8z" stroke="#00d4ff" stroke-width="2"/>
    </svg>
    <div class="boot-title">PUZZLENET VERSE</div>
  </div>
  <div class="boot-sub">گروه فنی پازل‌نت</div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="bootBar"></div></div>
  <div class="boot-status" id="bootStatus">اتصال به سرور...</div>
</div>

<div id="hud">
  <div class="hud-logo">PUZZLE<span>NET</span> VERSE</div>
  <div class="hud-center"><div class="hud-pill" id="roomLabel">خوش آمدید به پازل‌نت ورس</div></div>
  <div class="hud-right">
    <div class="hud-stat" id="coordsEl">۰ , ۰</div>
    <div class="hud-stat" id="zoomEl">زوم: ۱×</div>
  </div>
</div>

<div id="controls">
  <span>🖱 چپ: چرخش</span><span>🖱 راست: جابه‌جایی</span><span>🔍 اسکرول: زوم</span><span>Q/E چرخش</span><span>R بازنشانی</span>
</div>

<div id="infoPanel">
  <button id="infoPanelClose">✕</button>
  <div class="ip-icon" id="ipIcon">🌐</div>
  <div class="ip-name" id="ipName">نام اتاق</div>
  <div class="ip-service" id="ipService">SERVICE</div>
  <div class="ip-desc" id="ipDesc">توضیحات</div>
  <a class="ip-link" id="ipLink" href="#" target="_blank" rel="noopener">بیشتر بدانید ←</a>
</div>

<div id="minimapWrap">
  <div class="mm-label">نقشه کوچک</div>
  <canvas id="minimap" width="180" height="140"></canvas>
</div>

<div id="tooltip"></div>
<div id="labelLayer"></div>
<canvas id="world"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script src="js/rooms.js"></script>
<script src="js/renderer.js"></script>
<script src="js/world.js"></script>
</body>
</html>
